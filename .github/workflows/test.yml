name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # Fast, store-independent checks: formatting, lints, unit tests.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: devenv
      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv
      # `devenv test` runs enterTest: cargo fmt --check, clippy, and unit tests.
      - name: Run tests
        run: devenv test

  # End-to-end: install both Nix and Guix, generate each example's Guix .drv,
  # translate it, and `nix-store --realise` the result. Examples 1-4 are built;
  # m4-boot0 / hello (5-6) are translate-only here (hello would rebuild the
  # whole Guix world). sandbox=false lets the daemon use the runner's /bin/sh
  # (examples 1 & 3 use it as their builder).
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            sandbox = false
      - uses: PromyLOPh/guix-install-action@v1
        with:
          pullAfterInstall: false
      - uses: cachix/cachix-action@v16
        with:
          name: devenv
      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv
      - name: Build
        run: devenv shell -- cargo build --release
      - name: Translate and realise the examples
        run: bash examples/validate_all.sh
