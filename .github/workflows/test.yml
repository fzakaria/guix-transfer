name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: devenv
      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv
      # `devenv test` runs enterTest: cargo fmt --check, clippy, and the unit
      # tests. The end-to-end examples need guix + a Nix daemon and are not run.
      - name: Run tests
        run: devenv test
